# Phase 1 Configuration - Hardware Topology Discovery

# Parameter sweep ranges
transmon:
  junction_width_nm:
    min: 100
    max: 500
    step: 20
  junction_length_nm:
    min: 100
    max: 300
    step: 10
  pad_area_um2:
    min: 50
    max: 200
    step: 10
  gap_to_ground_um:
    min: 10
    max: 50
    step: 5

capacitor:
  finger_length_um:
    min: 10
    max: 100
    step: 5
  finger_width_um:
    min: 2
    max: 10
    step: 1
  finger_count:
    min: 2
    max: 20
    step: 2
  finger_gap_um:
    min: 2
    max: 8
    step: 1

resonator:
  hbar_thickness_um:
    min: 5
    max: 20
    step: 1
  beam_length_um:
    min: 50
    max: 500
    step: 25
  beam_width_um:
    min: 5
    max: 30
    step: 2

# Target specifications
target:
  qubit_frequency_ghz: 5.0
  mechanical_frequency_mhz: 500
  coupling_strength_mhz: 10
  temperature_mk: 20

# Simulation settings
simulation:
  fock_truncation_photons: 5
  fock_truncation_phonons: 10
  time_step_ns: 1.0
  trajectories: 1000
  seed: 42

# GNN training
gnn:
  hidden_dim: 128
  num_layers: 5
  learning_rate: 0.001
  batch_size: 32
  epochs: 500
  early_stopping_patience: 50
  weight_decay: 0.00001

# Output paths
paths:
  layouts_raw: "~/Research/Datasets/qsymphony/raw_simulations/layouts/raw_layouts/"
  layouts_top100: "~/Research/Datasets/qsymphony/raw_simulations/layouts/top100_layouts/"
  layouts_final: "~/Research/Datasets/qsymphony/raw_simulations/layouts/final_layout/"
  epr_results: "~/projects/qsymphony/results/phase1/epr_results/"
  figures: "~/projects/qsymphony/results/phase1/figures/"
  data: "~/projects/qsymphony/results/phase1/data/"
  models: "~/projects/qsymphony/results/models/"
